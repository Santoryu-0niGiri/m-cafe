<!-- ── Page Hero ── -->
<section class="gallery-hero">
  <div class="gallery-hero-overlay"></div>
  <div class="container gallery-hero-content">
    <p class="hero-eyebrow fade-in delay-1">Visual Stories</p>
    <h1 class="fade-in delay-2">Our Gallery</h1>
    <p class="fade-in delay-3">A glimpse into the world of M CAFE — crafted moments, captured with love.</p>
  </div>
</section>

<!-- ── Masonry Grid ── -->
<section class="section">
  <div class="container">
    <div class="masonry-grid">
      @for (img of images; track img.id) {
        <div class="masonry-item" [class]="'span-' + (img.span ?? 'normal')" (click)="openLightbox(img)">
          <div class="masonry-inner reveal">
            <img [src]="img.thumb" [alt]="img.alt" loading="lazy" />
            <div class="masonry-overlay">
              <i class="bi bi-zoom-in"></i>
              <span>{{ img.alt }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>

<!-- ── Lightbox Modal ── -->
@if (lightboxImage()) {
  <div class="lightbox" (click)="closeLightbox()">
    <button class="lightbox-close" (click)="closeLightbox()">
      <i class="bi bi-x-lg"></i>
    </button>
    <button class="lightbox-nav prev" (click)="$event.stopPropagation(); prev()">
      <i class="bi bi-chevron-left"></i>
    </button>
    <div class="lightbox-content" (click)="$event.stopPropagation()">
      <img [src]="lightboxImage()!.src" [alt]="lightboxImage()!.alt" />
      <p class="lightbox-caption">{{ lightboxImage()!.alt }}</p>
    </div>
    <button class="lightbox-nav next" (click)="$event.stopPropagation(); next()">
      <i class="bi bi-chevron-right"></i>
    </button>
  </div>
}
